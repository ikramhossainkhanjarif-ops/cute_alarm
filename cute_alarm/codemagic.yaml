workflows:
  android-apk:
    name: Romantic Alarm - Android APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.romantic.alarm.romantic_alarm"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build release APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
