workflows:
  android-apk:
    name: Romantic Alarm - Android APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Remove broken gradle wrapper if present
        script: |
          rm -f android/gradlew android/gradlew.bat
          rm -f android/gradle/wrapper/gradle-wrapper.jar

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build release APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
